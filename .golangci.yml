version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - fieldalignment

    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: var-naming
        - name: package-comments
          disabled: true

    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true

    goimports:
      local-prefixes:
        - opencode-agent-switcher

issues:
  max-issues-per-linter: 50
  max-same-issues: 3

run:
  modules-download-mode: readonly